services:
  - type: web
    name: mintuu-backend
    runtime: python
    plan: free
    buildCommand: pip install -e . && pip install 'python-jose[cryptography]' 'passlib[bcrypt]' aiohttp
    startCommand: uvicorn api.app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/v1/status
    autoDeploy: true
    envVars:
      - key: PYTHONPATH
        value: /opt/render/project/src/..
      - key: ENVIRONMENT
        value: production
      - key: MINTUU_DATA_DIR
        value: /opt/render/project/src/database
      - key: GROQ_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        sync: false
      - key: GITHUB_TOKEN
        sync: false
